services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dsreplace}
      POSTGRES_USER: ${POSTGRES_USER:-dsreplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dsreplace} -d ${POSTGRES_DB:-dsreplace}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ds_replace

  backend:
    build:
      context: ./backend
      network: host
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-dsreplace}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-dsreplace}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      KVM_PASSWORD: ${KVM_PASSWORD:-}
      VCENTER_PASSWORD: ${VCENTER_PASSWORD:-}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - ds_replace

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ds_replace

  reverse-proxy:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - ds_replace

networks:
  ds_replace:
    driver: bridge

volumes:
  postgres_data:
