name: ds-shift

services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dsshift}
      POSTGRES_USER: ${POSTGRES_USER:-dsshift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dsshift} -d ${POSTGRES_DB:-dsshift}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ds_shift

  backend:
    image: ds-shift-backend:latest
    build:
      context: ./backend
      network: host
    restart: unless-stopped
    deploy:
      replicas: 3
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-dsshift}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-dsshift}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      KVM_PASSWORD: ${KVM_PASSWORD:-}
      VCENTER_PASSWORD: ${VCENTER_PASSWORD:-}
      HOST_CONNECTOR_ENGINE_URL: http://host-connector-engine:8101
      CLOUD_CONNECTOR_ENGINE_URL: http://cloud-connector-engine:8102
      SPARK_ENGINE_URL: http://spark-engine:8200
      SERVICE_STATUS_MONITOR_URL: http://service-status-monitor:8090
    extra_hosts:
      - "kvm:192.168.0.9"
      - "vcsa.test.local:192.168.0.11"
    depends_on:
      database:
        condition: service_healthy
      host-connector-engine:
        condition: service_healthy
      cloud-connector-engine:
        condition: service_healthy
      spark-engine:
        condition: service_healthy
      service-status-monitor:
        condition: service_healthy
    volumes:
      - ./engine-ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - ds_shift

  service-status-monitor:
    image: ds-shift-service-status-monitor:latest
    build:
      context: ./status-monitor
    restart: unless-stopped
    deploy:
      replicas: 3
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-ds-shift}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - ds_shift

  host-connector-engine:
    image: ds-shift-host-connector-engine:latest
    build:
      context: ./connector-engines
      dockerfile: Dockerfile.host
    restart: unless-stopped
    deploy:
      replicas: 3
    environment:
      KVM_PASSWORD: ${KVM_PASSWORD:-}
      VCENTER_PASSWORD: ${VCENTER_PASSWORD:-}
      NUTANIX_PASSWORD: ${NUTANIX_PASSWORD:-}
    extra_hosts:
      - "kvm:192.168.0.9"
      - "vcsa.test.local:192.168.0.11"
    volumes:
      - ./engine-ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health', timeout=3).read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - ds_shift

  cloud-connector-engine:
    image: ds-shift-cloud-connector-engine:latest
    build:
      context: ./connector-engines
      dockerfile: Dockerfile.cloud
    restart: unless-stopped
    deploy:
      replicas: 3
    environment:
      AWS_CONNECTOR_CREDENTIALS: ${AWS_CONNECTOR_CREDENTIALS:-}
      GCP_CONNECTOR_CREDENTIALS: ${GCP_CONNECTOR_CREDENTIALS:-}
      AZURE_CONNECTOR_CREDENTIALS: ${AZURE_CONNECTOR_CREDENTIALS:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/health', timeout=3).read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - ds_shift

  spark-engine:
    image: ds-shift-spark-engine:latest
    build:
      context: ./spark-engine
    restart: unless-stopped
    deploy:
      replicas: 3
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-dsshift}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-dsshift}
      SPARK_LIVE_EXECUTION_ENABLED: ${SPARK_LIVE_EXECUTION_ENABLED:-false}
      KVM_PASSWORD: ${KVM_PASSWORD:-}
      VCENTER_PASSWORD: ${VCENTER_PASSWORD:-}
      NUTANIX_PASSWORD: ${NUTANIX_PASSWORD:-}
      AWS_CONNECTOR_CREDENTIALS: ${AWS_CONNECTOR_CREDENTIALS:-}
      GCP_CONNECTOR_CREDENTIALS: ${GCP_CONNECTOR_CREDENTIALS:-}
      AZURE_CONNECTOR_CREDENTIALS: ${AZURE_CONNECTOR_CREDENTIALS:-}
    extra_hosts:
      - "kvm:192.168.0.9"
      - "vcsa.test.local:192.168.0.11"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./engine-ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/health', timeout=3).read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - ds_shift

  frontend:
    image: ds-shift-frontend:latest
    build:
      context: ./frontend
    restart: unless-stopped
    deploy:
      replicas: 3
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ds_shift

  reverse-proxy:
    image: nginx:1.29-alpine
    restart: unless-stopped
    deploy:
      replicas: 3
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - ds_shift

  edge-gateway:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      reverse-proxy:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - ds_shift

networks:
  ds_shift:
    driver: bridge

volumes:
  postgres_data:
