resolver 127.0.0.11 valid=10s ipv6=off;

upstream reverse_proxy_pool {
    zone reverse_proxy_pool 64k;
    server reverse-proxy:443 resolve;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/ds-shift.crt;
    ssl_certificate_key /etc/nginx/certs/ds-shift.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass https://reverse_proxy_pool;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
